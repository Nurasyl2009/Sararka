# Render.com Blueprint — Сарыарқа Инжиниринг
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: saryarka-engineering
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saryarka-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"

databases:
  - name: saryarka-db
    plan: free
    databaseName: saryarka
