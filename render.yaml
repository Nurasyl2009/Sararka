# Render.com Blueprint — Сарыарқа Инжиниринг
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: saryarka-engineering
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saryarka-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"

databases:
  - name: saryarka-db
    plan: free
    databaseName: saryarka
